apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "incidentrelay.fullname" . }}-web
  labels:
    {{- include "incidentrelay.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "incidentrelay.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      annotations:
        {{- include "incidentrelay.configChecksum" . | nindent 8 }}
        {{- with .Values.web.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "incidentrelay.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "incidentrelay.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "incidentrelay.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: INCIDENTRELAY_CONFIG_FILE
              value: /etc/incidentrelay/incidentrelay.conf
            - name: INCIDENTRELAY_SERVICE
              value: web
            - name: INCIDENTRELAY_RUN_MIGRATIONS
              value: {{ .Values.web.runMigrations | ternary "1" "0" | quote }}
            - name: INCIDENTRELAY_PORT
              value: {{ .Values.web.port | quote }}
            - name: INCIDENTRELAY_WEB_WORKERS
              value: {{ .Values.web.gunicorn.workers | quote }}
            - name: INCIDENTRELAY_WEB_THREADS
              value: {{ .Values.web.gunicorn.threads | quote }}
            - name: INCIDENTRELAY_WEB_TIMEOUT
              value: {{ .Values.web.gunicorn.timeout | quote }}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- include "incidentrelay.volumeMounts" . | nindent 12 }}
      volumes:
        {{- include "incidentrelay.volumes" . | nindent 8 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
