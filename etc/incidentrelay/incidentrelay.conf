[main]
secret_key = change-this-secret-key
timezone = UTC

[server]
host = 0.0.0.0
port = 8080
public_base_url = http://localhost:8080

[database]
# Supported values: sqlite, mysql, postgresql
type = sqlite
name = /var/lib/incidentrelay/incidentrelay.db
user =
password =
host = 127.0.0.1
port = 0

[auth]
api_auth_required = true
rbac_enforced = true
jwt_secret = change-this-jwt-secret
jwt_expire_minutes = 1440
jwt_cookie_name = incidentrelay_jwt
jwt_cookie_secure = false

[alerts]
# How often the reminder scheduler scans unacknowledged alerts.
reminder_interval_seconds = 60

# Deduplicate alerts with the same source and dedup key within this window.
alert_group_window_seconds = 3600

[scheduler]
# Database lock TTL for scheduler jobs.
lock_ttl_seconds = 120

[mattermost]
# Used to validate Mattermost interactive button callbacks.
action_secret = change-this-mattermost-action-secret

[smtp]
host =
port = 587
user =
password =
from = incidentrelay@example.com
use_tls = true

[logging]
# Only user actions, incoming alerts and errors are written as JSON lines.
file = /var/log/incidentrelay/incidentrelay.log
level = INFO

[voice]
# Default voice provider if channel config does not override it.
provider = stub

# Directory for custom self-hosted voice provider modules.
# This directory contains executable Python code and must be writable only by admin/root.
providers_dir = /usr/local/lib/incidentrelay/voice_providers

# Global fallback secret for voice callbacks.
# Channel config callback_secret has higher priority.
callback_secret = change-me

text_template = IncidentRelay alert {alert_id}. {title}. Severity {severity}. {message}. Press 1 to acknowledge. Press 2 to resolve.
dtmf_actions = {"1": "acknowledge", "2": "resolve"}
callback_secret = test-voice-secret

[voice_provider]
api_url = https://voice.example.com/api
api_token = ${VOICE_API_TOKEN}
timeout = 10

[telegram]
proxy_url =
