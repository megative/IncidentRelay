[main]
secret_key = test-secret-key
timezone = UTC

[server]
host = 127.0.0.1
port = 8080
public_base_url = http://127.0.0.1:8080

[database]
type = sqlite
name = tests/.tmp/incidentrelay-ci.db
user =
password =
host = 127.0.0.1
port = 0

[auth]
api_auth_required = true
rbac_enforced = true
jwt_secret = test-jwt-secret
jwt_expire_minutes = 1440
jwt_cookie_name = incidentrelay_jwt
jwt_cookie_secure = false

[alerts]
reminder_after_seconds = 300
reminder_interval_seconds = 60
alert_group_window_seconds = 3600

[scheduler]
lock_ttl_seconds = 120

[mattermost]
action_secret = test-mattermost-secret

[smtp]
host =
port = 587
user =
password =
from = incidentrelay@example.com
use_tls = true

[logging]
file = ./logs/incidentrelay-test.log
level = INFO

[voice]
provider = stub
callback_secret = test-voice-secret
text_template = IncidentRelay alert {alert_id}. {title}. Severity {severity}. {message}. Press 1 to acknowledge. Press 2 to resolve.
dtmf_actions = {"1": "acknowledge", "2": "resolve"}

[voice_provider]
api_url = https://voice.example.com/api
api_token = test
timeout = 10

[telegram]
proxy_url =
