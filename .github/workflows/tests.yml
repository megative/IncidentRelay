name: Tests

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    env:
      INCEDENTRELAY_CONFIG_FILE: ${{ github.workspace }}/tests/incidentrelay.test.conf
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Prepare test directories
        run: |
          mkdir -p tests/.tmp logs

      - name: Check Python syntax
        run: |
          python -m compileall app manage.py run.py

      - name: Run migrations
        run: |
          python manage.py migrate

      - name: Check database schema
        run: |
          python -m app.check_schema

      - name: Check templates
        run: |
          python -m app.check_templates

      - name: Run pytest with coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=35
