<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>IncidentRelay offline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1570ef">
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8fafc;
            color: #101828;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(440px, 100%);
            padding: 28px;
            border: 1px solid #e5edf6;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(16, 24, 40, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
            line-height: 1.2;
        }

        p {
            margin: 0;
            color: #667085;
            line-height: 1.5;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            font-weight: 800;
            color: #1570ef;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #1570ef;
        }

        button {
            margin-top: 18px;
            min-height: 36px;
            padding: 0 14px;
            border: 0;
            border-radius: 10px;
            background: #1570ef;
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
<main>
    <div class="brand">
        <span class="dot"></span>
        IncidentRelay
    </div>

    <h1>You are offline</h1>
    <p>
        IncidentRelay needs a network connection to show current alerts,
        rotations and service impact. Check your connection and try again.
    </p>

    <button type="button" onclick="window.location.reload()">
        Retry
    </button>
</main>
</body>
</html>
