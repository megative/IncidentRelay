<link rel="stylesheet" href="/static/css/calendar_week.css">

<div class="first-div-page-layout page-stack">
  <div class="summary-grid">
    <div class="summary-card summary-primary">
      <div class="summary-icon">T</div>
      <div>
        <div class="summary-title">Visible teams</div>
        <div id="calendar-summary-teams" class="summary-value">0</div>
        <div class="summary-hint">Current calendar scope</div>
      </div>
    </div>

    <div class="summary-card summary-success">
      <div class="summary-icon">✓</div>
      <div>
        <div class="summary-title">People on call</div>
        <div id="calendar-summary-users" class="summary-value">0</div>
        <div class="summary-hint">Unique users in range</div>
      </div>
    </div>

    <div class="summary-card summary-info">
      <div class="summary-icon">↻</div>
      <div>
        <div class="summary-title">Assignments</div>
        <div id="calendar-summary-assignments" class="summary-value">0</div>
        <div class="summary-hint">Scheduled shifts</div>
      </div>
    </div>

    <div class="summary-card summary-muted">
      <div class="summary-icon">⌁</div>
      <div>
        <div class="summary-title">Overrides</div>
        <div id="calendar-summary-overrides" class="summary-value">0</div>
        <div class="summary-hint">Manual changes</div>
      </div>
    </div>
  </div>

  <div class="page-layout-grid">
    <section class="card page-layout-main">
      <div class="card-header">
        <div>
          <h2>On-call calendar</h2>
          <div id="calendar-range-title" class="card-subtitle">
            Current week
          </div>
        </div>

        <div class="card-header-actions">
          <button id="calendar-today" type="button" class="btn">
            Today
          </button>

          <button id="calendar-prev" type="button" class="btn btn-icon" aria-label="Previous">
            ‹
          </button>

          <button id="calendar-next" type="button" class="btn btn-icon" aria-label="Next">
            ›
          </button>

          <button id="reload-calendar" type="button" class="btn btn-primary">
            Reload
          </button>
        </div>
      </div>

      <div class="page-toolbar is-flush-top">
        <div class="page-toolbar-search">
          <span class="page-toolbar-search-icon">⌕</span>
          <input
            id="calendar-search"
            class="input"
            type="search"
            placeholder="Search user, team or rotation..."
            autocomplete="off"
          >
        </div>
        <select
            id="calendar-rotation-filter"
            class="input filter-select"
            style="display: none;"
        ></select>
        <input
          id="calendar-start"
          class="input page-toolbar-filter"
          type="date"
        >

        <input
          id="calendar-end"
          class="input page-toolbar-filter"
          type="date"
        >
      </div>

      <div class="calendar-shell">
        <div id="calendar-grid" class="calendar-week-grid">
          <div class="empty-cell">—</div>
        </div>
      </div>

    </section>

    <aside class="card page-details-card">
      <div class="card-header">
        <div>
          <h2>Shift details</h2>
          <div id="calendar-details-subtitle" class="card-subtitle">
            Select an assignment
          </div>
        </div>
      </div>

      <div id="calendar-details-body" class="details-body">
        <div class="details-empty">
          Click any shift in the calendar to see user, team, rotation and time range.
        </div>
      </div>
    </aside>
  </div>
</div>
