<div id="rotation-overrides-modal" class="app-modal" style="display: none;">
    <div class="app-modal-dialog app-modal-dialog-wide">
        <div class="app-modal-header">
            <div>
                <h2 id="overrides-title">Overrides</h2>
                <div class="card-subtitle">Temporarily replace the normal on-call user</div>
            </div>

            <button id="close-rotation-overrides-modal" type="button" class="app-modal-close">
                ×
            </button>
        </div>

        <div class="app-modal-body">
            <div class="form-body rotations-inline-form">
                <div>
                    <label>Rotation</label>
                    <select id="override-rotation" class="input"></select>
                </div>

                <div>
                    <label>User</label>
                    <select id="override-user" class="input"></select>
                </div>

                <div>
                    <label>Starts at</label>
                    <input id="override-starts-at" class="input" type="datetime-local">
                </div>

                <div>
                    <label>Ends at</label>
                    <input id="override-ends-at" class="input" type="datetime-local">
                </div>

                <div class="rotations-inline-wide">
                    <label>Reason</label>
                    <input id="override-reason" class="input" placeholder="Vacation, sick leave, manual replacement">
                </div>

                <div class="actions">
                    <button id="create-override" type="button" class="btn btn-primary btn-small">
                        Create override
                    </button>

                    <button id="reload-overrides" type="button" class="btn btn-small">
                        Reload
                    </button>
                </div>
            </div>

            <div class="help-text rotations-modal-help">
                Override temporarily replaces the normal on-call user for the selected rotation and time range.
            </div>

            <div class="table-wrapper rotations-modal-table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Starts</th>
                        <th>Ends</th>
                        <th>Reason</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="overrides-table">
                    <tr>
                        <td colspan="6">No rotation selected</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="app-modal-footer">
            <button id="close-rotation-overrides-modal-footer" type="button" class="btn">
                Close
            </button>
        </div>
    </div>
</div>
