<div id="rotation-overrides-modal" class="app-modal" style="display: none;">
    <div class="app-modal-dialog app-modal-dialog-wide">
      <div class="app-modal-header">
        <div>
          <h2 id="overrides-title">Overrides</h2>
          <div class="card-subtitle">
            Temporarily replace the calculated on-call user.
          </div>
        </div>

        <button
          id="close-rotation-overrides-modal"
          type="button"
          class="app-modal-close"
          aria-label="Close"
        >
          ×
        </button>
      </div>

      <div class="app-modal-body">
        <div class="grid-two">
          <section class="card">
            <div class="card-header">
              <div>
                <h2>Create override</h2>
                <div class="card-subtitle">
                  Pick a user and override window.
                </div>
              </div>
            </div>

            <div class="form-body">
              <label for="override-rotation">Rotation</label>
              <select id="override-rotation" class="input"></select>

              <label for="override-user">User</label>
              <select id="override-user" class="input"></select>

              <label for="override-starts-at">Starts at</label>
              <input
                id="override-starts-at"
                class="input"
                type="datetime-local"
                min="0000-01-01T00:00"
                max="9999-12-31T23:59"
                step="60"
              >

              <label for="override-ends-at">Ends at</label>
              <input
                id="override-ends-at"
                class="input"
                type="datetime-local"
                min="0000-01-01T00:00"
                max="9999-12-31T23:59"
                step="60"
              >

              <label for="override-reason">Reason</label>
              <textarea
                id="override-reason"
                class="input"
                placeholder="Vacation, sick leave, manual replacement..."
              ></textarea>

              <div class="form-actions-inline">
                <button id="create-override" type="button" class="btn btn-primary">
                  Create override
                </button>

                <button id="reload-overrides" type="button" class="btn">
                  Reload
                </button>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2>Existing overrides</h2>
                <div class="card-subtitle">
                  Active and scheduled manual replacements.
                </div>
              </div>
            </div>

            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Starts</th>
                    <th>Ends</th>
                    <th>Reason</th>
                    <th class="actions-th">Actions</th>
                  </tr>
                </thead>

                <tbody id="overrides-table">
                  <tr>
                    <td colspan="6" class="empty-cell">No rotation selected</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </div>

      <div class="app-modal-footer">
        <button id="close-rotation-overrides-modal-footer" type="button" class="btn">
          Close
        </button>
      </div>
    </div>
  </div>
