<div id="alert-details-modal" class="app-modal" style="display: none;">
  <div class="app-modal-dialog app-modal-dialog-wide">
    <div class="app-modal-header">
      <div>
        <h2 id="alert-details-title">Alert details</h2>
        <div id="alert-details-subtitle" class="card-subtitle"></div>
      </div>

      <button
        id="close-alert-details"
        type="button"
        class="app-modal-close"
        aria-label="Close"
      >
        ×
      </button>
    </div>

    <div class="app-modal-body">
      <div id="alert-details-summary" class="details-grid"></div>

      <div class="details-section">
        <div class="details-section-title">Labels</div>
        <pre id="alert-details-labels" class="details-code"></pre>
      </div>

      <div class="details-section">
        <div class="details-section-title">Events</div>
        <div id="alert-details-events" class="event-list"></div>
      </div>

      <div class="details-section">
        <div class="details-section-title">Notification delivery</div>
        <div id="alert-details-notifications" class="event-list"></div>
      </div>

      <div class="details-section">
        <div class="details-section-title">Payload</div>
        <pre id="alert-details-payload" class="details-code"></pre>
      </div>
    </div>

    <div class="app-modal-footer">
      <button id="modal-alert-ack" type="button" class="btn btn-warning btn-small">
        Acknowledge
      </button>

      <button id="modal-alert-resolve" type="button" class="btn btn-resolve btn-small">
        Resolve
      </button>

      <button id="close-alert-details-footer" type="button" class="btn btn-small">
        Close
      </button>
    </div>
  </div>
</div>
