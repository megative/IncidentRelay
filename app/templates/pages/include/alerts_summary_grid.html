<div id="{{ summary_id }}" class="summary-grid">
  <div class="summary-card summary-danger clickable-summary-card"
       role="button"
       tabindex="0"
       data-href="/alerts?status=firing"
       title="Show firing alerts">
    <div class="summary-icon">!</div>
    <div>
      <div class="summary-title">Firing alerts</div>
      <div class="summary-value" data-summary-value="firing">0</div>
      <div class="summary-hint">Need attention</div>
    </div>
  </div>

  <div class="summary-card summary-warning clickable-summary-card"
       role="button"
       tabindex="0"
       data-href="/alerts?status=acknowledged"
       title="Show acknowledged alerts">
    <div class="summary-icon">✓</div>
    <div>
      <div class="summary-title">Acknowledged</div>
      <div class="summary-value" data-summary-value="acknowledged">0</div>
      <div class="summary-hint">Someone is working</div>
    </div>
  </div>

  <div class="summary-card summary-success clickable-summary-card"
       role="button"
       tabindex="0"
       data-href="/alerts?status=resolved"
       title="Show resolved alerts">
    <div class="summary-icon">✓</div>
    <div>
      <div class="summary-title">Resolved</div>
      <div class="summary-value" data-summary-value="resolved">0</div>
      <div class="summary-hint">Closed incidents</div>
    </div>
  </div>

  <div class="summary-card summary-info clickable-summary-card"
       role="button"
       tabindex="0"
       data-href="/alerts?sort=reminders&order=desc"
       title="Show alerts sorted by reminders">
    <div class="summary-icon">↻</div>
    <div>
      <div class="summary-title">Reminders</div>
      <div class="summary-value" data-summary-value="reminders">0</div>
      <div class="summary-hint">Repeated notifications</div>
    </div>
  </div>

  <div class="summary-card summary-primary clickable-summary-card"
       role="button"
       tabindex="0"
       data-href="/alerts"
       title="Show all alerts">
    <div class="summary-icon">#</div>
    <div>
      <div class="summary-title">Total alerts</div>
      <div class="summary-value" data-summary-value="total">0</div>
      <div class="summary-hint">Current selection</div>
    </div>
  </div>
</div>
