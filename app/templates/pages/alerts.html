<link rel="stylesheet" href="{{ url_for('static', filename='css/alerts.css') }}">

<div class="first-div-page-layout page-stack">
    {% set summary_id = "alerts-alerts-summary" %}
    {% include 'pages/include/alerts_summary_grid.html' %}
    <section class="card alerts-table-card">
        <div class="card-header table-card-header">
            <div>
                <h2>Alert inbox</h2>
                <div class="card-subtitle">
                    Showing
                    <span id="alerts-page-from">0</span>-<span id="alerts-page-to">0</span>
                    of <span id="alerts-filtered-count">0</span>
                    alerts
                    <span id="alerts-total-wrapper">
                        / <span id="alerts-total-count">0</span> total
                    </span>
                </div>
            </div>
            <div class="card-header-actions">
                <label class="alerts-switch md-switch">
                    <input id="alerts-auto-refresh" type="checkbox">
                    <span>Auto refresh</span>
                </label>
                <button id="reload-alerts" type="button" class="btn btn-primary">Reload</button>
            </div>
        </div>
        <div class="table-toolbar page-toolbar">
            <div class="table-search page-toolbar-search">
                <span class="table-search-icon page-toolbar-search-icon">⌕</span>
                <input
                  id="table-search"
                  class="input"
                  type="search"
                  placeholder="Search by ID, alert name, team, assignee, source..."
                  autocomplete="off"
                >
            </div>
                <select
                    id="alerts-service-filter"
                    multiple
                    data-table-multi-select
                    data-placeholder="All services"
                ></select>
            <select
                id="status-filter"
                multiple
                data-table-multi-select
                data-placeholder="All statuses"
            >
                <option value="firing">Firing</option>
                <option value="acknowledged">Acknowledged</option>
                <option value="silenced">Silenced</option>
                <option value="resolved">Resolved</option>
            </select>
                <select
                    id="severity-filter"
                    multiple
                    data-table-multi-select
                    data-placeholder="All severities"
                >
                    <option value="critical">Critical</option>
                    <option value="high">High</option>
                    <option value="warning">Warning</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="info">Info</option>
                </select>

            <select id="alerts-sort" class="input table-filter-select page-toolbar-filter">
                <option value="activity_desc">Newest activity</option>
                <option value="created_desc">Newest created</option>
                <option value="created_asc">Oldest created</option>
                <option value="severity_desc">Severity first</option>
                <option value="status_asc">Status</option>
            </select>
        </div>
        <div id="alerts-active-filters" class="table-active-filters"></div>

    <div class="table-wrapper">
      <table id="alerts-table-view" class="data-table alerts-table alerts-inbox-table sortable-table">
        <thead>
          <tr>
            <th data-sort="status">Status</th>
            <th data-sort="id">ID</th>
            <th data-sort="title">Alert</th>
            <th data-sort="severity">Severity</th>
            <th data-sort="team">Team</th>
            <th data-sort="assignee">Assignee</th>
            <th data-sort="created">Created</th>
            <th data-sort="last_seen">Last seen</th>
            <th>Escalations</th>
            <th data-sort="reminders">Reminders</th>
            <th class="alerts-actions-th">Actions</th>
          </tr>
        </thead>

        <tbody id="alerts-table"></tbody>
      </table>
    </div>

  </section>
</div>
